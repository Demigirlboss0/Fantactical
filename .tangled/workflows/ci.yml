when:
  - event: ["push", "manual"]
    branch: ["main"]
  - event: ["pull_request"]
    branch: ["main"]

engine: "nixery"

dependencies:
  nixpkgs:
    - rustup
    - gcc
    - binutils
    - pkg-config
    - udev
    - libxkbcommon
    - vulkan-loader
    - wayland

steps:
  - name: "Install Rust stable"
    command: |
      rustup toolchain install stable
      rustup default stable

  - name: "Check formatting"
    command: cargo fmt --check

  - name: "Clippy lint"
    command: |
      export PKG_CONFIG_PATH="$(find /nix/store -name 'wayland-client.pc' -printf '%h\n' -quit 2>/dev/null):$PKG_CONFIG_PATH"
      cargo clippy -- -D warnings

  - name: "Run unit tests"
    command: |
      export PKG_CONFIG_PATH="$(find /nix/store -name 'wayland-client.pc' -printf '%h\n' -quit 2>/dev/null):$PKG_CONFIG_PATH"
      cargo test --lib

  - name: "Run integration tests"
    command: |
      export PKG_CONFIG_PATH="$(find /nix/store -name 'wayland-client.pc' -printf '%h\n' -quit 2>/dev/null):$PKG_CONFIG_PATH"
      cargo test --test network_integration
