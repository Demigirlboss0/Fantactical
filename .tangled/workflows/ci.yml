when:
  - event: ["push", "manual"]
    branch: ["main"]
  - event: ["pull_request"]
    branch: ["main"]

engine: "nixery"

dependencies:
  nixpkgs:
    - rustup
    - gcc
    - binutils
    - pkg-config
    - udev
    - libxkbcommon
    - vulkan-loader
    - wayland

steps:
  - name: "Install Rust stable"
    command: |
      rustup toolchain install stable
      rustup default stable

  - name: "Check formatting"
    command: cargo fmt --check

  - name: "Clippy lint"
    command: cargo clippy -- -D warnings
    env:
      WAYLAND_CLIENT_NO_PKG_CONFIG: "1"

  - name: "Run unit tests"
    command: cargo test --lib
    env:
      WAYLAND_CLIENT_NO_PKG_CONFIG: "1"

  - name: "Run integration tests"
    command: cargo test --test network_integration
    env:
      WAYLAND_CLIENT_NO_PKG_CONFIG: "1"
