when:
  - event: ["push", "manual"]
    branch: ["main"]
  - event: ["pull_request"]
    branch: ["main"]

engine: "nixery"

dependencies:
  nixpkgs:
    - rustup
    - gcc
    - binutils
    - pkg-config
    - udev
    - libxkbcommon
    - vulkan-loader
    - xlibsWrapper
    - libxcb

steps:
  - name: "Install Rust stable"
    command: |
      rustup toolchain install stable
      rustup default stable

  - name: "Check formatting"
    command: cargo fmt --check

  - name: "Clippy lint"
    command: |
      cat > /tmp/wayland-client.pc << 'PCEOF'
      prefix=/usr
      libdir=/nix/store/phony
      includedir=/nix/store/phony
      Name: wayland-client
      Description: Wayland client library (stub for CI)
      Version: 1.22.0
      Libs: -L${libdir} -lwayland-client
      Cflags: -I${includedir}
      PCEOF
      export WAYLAND_CLIENT_NO_PKG_CONFIG=1
      export PKG_CONFIG_PATH=/tmp:$PKG_CONFIG_PATH
      cargo clippy -- -D warnings

  - name: "Run unit tests"
    command: |
      cat > /tmp/wayland-client.pc << 'PCEOF'
      prefix=/usr
      libdir=/nix/store/phony
      includedir=/nix/store/phony
      Name: wayland-client
      Description: Wayland client library (stub for CI)
      Version: 1.22.0
      Libs: -L${libdir} -lwayland-client
      Cflags: -I${includedir}
      PCEOF
      export WAYLAND_CLIENT_NO_PKG_CONFIG=1
      export PKG_CONFIG_PATH=/tmp:$PKG_CONFIG_PATH
      cargo test --lib

  - name: "Run integration tests"
    command: |
      cat > /tmp/wayland-client.pc << 'PCEOF'
      prefix=/usr
      libdir=/nix/store/phony
      includedir=/nix/store/phony
      Name: wayland-client
      Description: Wayland client library (stub for CI)
      Version: 1.22.0
      Libs: -L${libdir} -lwayland-client
      Cflags: -I${includedir}
      PCEOF
      export WAYLAND_CLIENT_NO_PKG_CONFIG=1
      export PKG_CONFIG_PATH=/tmp:$PKG_CONFIG_PATH
      cargo test --test network_integration
